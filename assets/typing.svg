<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 400 50'
    style='background-color: #00000000;'
    width='400px' height='50px'>

    
                <!-- Static centered text elements that fade in/out sequentially -->
                <!-- Total loop duration: 16s (4s per phrase). Each <animate> uses the same dur and keyTimes
                     so each phrase is visible for ~3.6s with 0.4s fades. repeatCount='indefinite' -->
                <text x='50%' y='50%' text-anchor='middle' dominant-baseline='middle'
                    font-family='Poppins, sans-serif' font-size='24' fill='#FFC5D3' style='opacity:0'>
                    Scanning you..
                    <animate attributeName='opacity' dur='16s' repeatCount='indefinite'
                        values='0;0;1;1;0;0' keyTimes='0;0;0.05;0.2;0.25;1' />
                </text>

                <text x='50%' y='50%' text-anchor='middle' dominant-baseline='middle'
                    font-family='Poppins, sans-serif' font-size='24' fill='#FFC5D3' style='opacity:0'>
                    Scan Complete!
                    <animate attributeName='opacity' dur='16s' repeatCount='indefinite'
                        values='0;0;1;1;0;0' keyTimes='0;0.25;0.3;0.45;0.5;1' />
                </text>

                <text x='50%' y='50%' text-anchor='middle' dominant-baseline='middle'
                    font-family='Poppins, sans-serif' font-size='24' fill='#FFC5D3' style='opacity:0'>
                    Hello, I am Fritzie!
                    <animate attributeName='opacity' dur='16s' repeatCount='indefinite'
                        values='0;0;1;1;0;0' keyTimes='0;0.5;0.55;0.7;0.75;1' />
                </text>

                <text x='50%' y='50%' text-anchor='middle' dominant-baseline='middle'
                    font-family='Poppins, sans-serif' font-size='24' fill='#FFC5D3' style='opacity:0'>
                    Your personal code companion!
                    <animate attributeName='opacity' dur='16s' repeatCount='indefinite'
                        values='0;0;1;1;0;0' keyTimes='0;0.75;0.8;0.95;1;1' />
                </text>
</svg>
