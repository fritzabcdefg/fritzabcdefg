<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 400 50'
    style='background-color: #00000000;'
    width='400px' height='50px'>

    
                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d4.end'
                    dur='5000ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h400 ; m0,25 h400 ; m0,25 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#FF1493' font-size='24'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal' style='opacity:0'>
        <animate attributeName='opacity' begin='d0.begin+0.05s' dur='0.01s' to='1' fill='freeze' />
        <textPath xlink:href='#path0'>
            Scanning you...
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='5000ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h400 ; m0,25 h400 ; m0,25 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#FF1493' font-size='24'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal' style='opacity:0'>
        <animate attributeName='opacity' begin='d1.begin+0.05s' dur='0.01s' to='1' fill='freeze' />
        <textPath xlink:href='#path1'>
            Scan complete
        </textPath>
    </text>
        <path id='path2'>
                            <!-- Single line -->
                                <animate id='d2' attributeName='d' begin='d1.end'
                    dur='5000ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h400 ; m0,25 h400 ; m0,25 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#FF1493' font-size='24'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal' style='opacity:0'>
        <animate attributeName='opacity' begin='d2.begin+0.05s' dur='0.01s' to='1' fill='freeze' />
        <textPath xlink:href='#path2'>
            Hello, I am Fritzie
        </textPath>
    </text>
        <path id='path3'>
                            <!-- Single line -->
                                <animate id='d3' attributeName='d' begin='d2.end'
                    dur='5000ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h400 ; m0,25 h400 ; m0,25 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#FF1493' font-size='24'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal' style='opacity:0'>
        <animate attributeName='opacity' begin='d3.begin+0.05s' dur='0.01s' to='1' fill='freeze' />
        <textPath xlink:href='#path3'>
            Your personal code companion
        </textPath>
    </text>
        <path id='path4'>
                            <!-- Single line -->
                                <animate id='d4' attributeName='d' begin='d3.end'
                    dur='5000ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h400 ; m0,25 h400 ; m0,25 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#FF1493' font-size='24'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal' style='opacity:0'>
        <animate attributeName='opacity' begin='d4.begin+0.05s' dur='0.01s' to='1' fill='freeze' />
        <textPath xlink:href='#path4'>
            How may I help you?
        </textPath>
    </text>
</svg>
